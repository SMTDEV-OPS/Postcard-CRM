# Render Blueprint — backend API (monorepo rootDir)
# Dashboard: New → Blueprint → connect this repo, or set Root Directory to "backend" manually.
services:
  - type: web
    name: postcardcrm-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=4096
      - key: PORT
        value: 4000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
