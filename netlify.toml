# Netlify — frontend SPA (monorepo)
# Required in Netlify UI → Site settings → Environment variables:
#   VITE_API_BASE_URL = https://<your-render-service>.onrender.com
# Optional:
#   VITE_HOTEL_BRAND, VITE_ADMIN_EMAIL_PLACEHOLDER, VITE_SUPPORT_EMAIL
[build]
  base = "crm_frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "22"
